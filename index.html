    <script>
        // Fungsi interaktif untuk Dark Mode / Light Mode
        const modeButton = document.createElement('button');
        modeButton.innerText = '🌙 Tukar Tema';
        modeButton.style.position = 'fixed';
        modeButton.style.bottom = '20px';
        modeButton.style.right = '20px';
        modeButton.style.padding = '10px 15px';
        modeButton.style.backgroundColor = '#2c3e50';
        modeButton.style.color = '#fff';
        modeButton.style.border = 'none';
        modeButton.style.borderRadius = '20px';
        modeButton.style.cursor = 'pointer';
        modeButton.style.fontWeight = 'bold';
        
        document.body.appendChild(modeButton);

        modeButton.addEventListener('click', () => {
            if (document.body.style.backgroundColor === 'rgb(44, 62, 80)') {
                document.body.style.backgroundColor = '#f7f5f0';
                document.body.style.color = '#333333';
                modeButton.innerText = '🌙 Tukar Tema';
            } else {
                document.body.style.backgroundColor = '#2c3e50';
                document.body.style.color = '#ffffff';
                modeButton.innerText = '☀️ Tukar Tema';
            }
        });
    </script>

</body>
